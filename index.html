<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Dijkstra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <canvas id="lienzoGrafos" width="800" height="600"></canvas>

        <div class="panel-herramientas">
            <h2>Herramientas</h2>
            
            <button id="btnAgregarNodo">Agregar Nodo</button>
            <button id="btnSeleccionar">Seleccionar</button>
            
            <div class="seccion">
                <label>Nodo a eliminar:</label>
                <input type="number" id="inputEliminarNodo" placeholder="Ej: 1">
                <button id="btnEliminarNodo" class="btn-peligro">Eliminar Nodo</button>
            </div>

            <div class="seccion">
                <h3>Agregar arco</h3>
                <label>Nodo origen:</label>
                <input type="number" id="arcoOrigen">
                <label>Nodo destino:</label>
                <input type="number" id="arcoDestino">
                <label>Peso:</label>
                <input type="number" id="arcoPeso">
                <button id="btnAgregarArco">Agregar Arco</button>
            </div>

            <div class="seccion">
                <h3>Dijkstra</h3>
                <label>Nodo inicial:</label>
                <select id="selectNodoInicial"></select>
                <button id="btnCalcularDijkstra" class="btn-exito">Calcular Dijkstra</button>
            </div>
            <div class="seccion" id="panelResultados" style="display: none;">
                <h3>Rutas más cortas</h3>
                <div id="contenidoResultados"></div>
            </div>
        </div>
    </div>
    <script src="logica.js"></script>
    <script src="app.js"></script>
</body>
</html>
